name: Daily Knowledge Collection

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 2:00 (北京时间 10:00)
  workflow_dispatch:       # 支持手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LangGraph workflow
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUDGET_LIMIT_YUAN: '1.0'
        run: python -m workflows.graph

      - name: Commit new articles
        run: |
          git config user.name "AI Knowledge Bot"
          git config user.email "bot@example.com"
          git add knowledge/
          git diff --cached --quiet || git commit -m "chore: daily knowledge collection $(date +%Y-%m-%d)"
          git push
