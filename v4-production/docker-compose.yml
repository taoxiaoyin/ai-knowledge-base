# ============================================================
# AI 知识库 V4 — Docker Compose 编排
# ============================================================
# 三个服务：
#   pipeline  — 定时采集分析流水线（cron 触发）
#   bot       — 交互式知识库机器人（常驻运行）
#   openclaw  — OpenClaw 消息网关（统一入口）
# ============================================================

version: "3.9"

services:
  # ----------------------------------------------------------
  # 流水线服务 — 定时执行采集→分析→整理→发布
  # ----------------------------------------------------------
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kb-pipeline
    restart: unless-stopped
    command: >
      sh -c "
        echo '0 8 * * * cd /app && python -m pipeline.pipeline >> /app/data/pipeline.log 2>&1' > /tmp/crontab &&
        echo '0 20 * * * cd /app && python -m pipeline.pipeline >> /app/data/pipeline.log 2>&1' >> /tmp/crontab &&
        crontab /tmp/crontab &&
        cron -f
      "
    volumes:
      - knowledge-data:/app/knowledge
      - app-data:/app/data
    env_file:
      - .env
    environment:
      - TZ=Asia/Singapore
      - PYTHONPATH=/app
    networks:
      - kb-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # 机器人服务 — 交互式知识库问答（常驻）
  # ----------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kb-bot
    restart: unless-stopped
    command: ["python", "-m", "bot.knowledge_bot"]
    volumes:
      - knowledge-data:/app/knowledge
      - app-data:/app/data
    env_file:
      - .env
    environment:
      - TZ=Asia/Singapore
      - PYTHONPATH=/app
    depends_on:
      - pipeline
    networks:
      - kb-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # OpenClaw 网关 — 统一消息路由
  # ----------------------------------------------------------
  openclaw:
    image: openclaw/gateway:latest
    container_name: kb-openclaw
    restart: unless-stopped
    ports:
      - "${OPENCLAW_PORT:-3000}:3000"
    volumes:
      - ./openclaw:/app/config
      - knowledge-data:/app/knowledge:ro
    env_file:
      - .env
    environment:
      - OPENCLAW_CONFIG=/app/config/openclaw.json5
      - TZ=Asia/Singapore
    depends_on:
      - bot
    networks:
      - kb-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================
# 持久化卷
# ============================================================
volumes:
  knowledge-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./knowledge
  app-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data

# ============================================================
# 网络
# ============================================================
networks:
  kb-network:
    driver: bridge
